<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Open+Sans:wght@400&display=swap" rel="stylesheet">
    <style>
      *{box-sizing:border-box}
      body{margin:0}
      .slide-container {
        width: 1280px;
        min-height: 720px;
        background-color: #FFFFFF;
        font-family: 'Open Sans', sans-serif;
        position: relative;
        display: flex;
        align-items: center;
        overflow: hidden;
      }
      .diagonal-accent-top {
        position: absolute;
        top: -90px;
        right: -90px;
        width: 360px;
        height: 180px;
        background: linear-gradient(135deg, #1A237E 50%, #BF9B30 50%);
        transform: rotate(-15deg);
      }
      .diagonal-accent-bottom {
        position: absolute;
        bottom: -90px;
        left: -90px;
        width: 360px;
        height: 180px;
        background: linear-gradient(135deg, #1A237E 50%, #BF9B30 50%);
        transform: rotate(-15deg);
      }
      .content {
        padding-left: 56px; /* reduced inner padding */
        width: 60%;
        z-index: 2;
      }
      .logo-placeholder {
        width: 80px;
        height: 80px;
        background-color: #1A237E;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: bold;
        font-size: 24px;
        margin-bottom: 24px; /* reduced spacing */
      }
      h1 {
        font-family: 'Montserrat', sans-serif;
        color: #1A237E;
        font-size: 64px;
        line-height: 1.1;
        margin-bottom: 20px;
      }
      .subtitle {
        color: #37474F;
        font-size: 28px;
        font-weight: 400;
        border-top: 3px solid #BF9B30; /* slightly thinner */
        padding-top: 10px; /* reduced inner padding */
        display: inline-block;
      }
      .truck-placeholder {
        position: absolute;
        right: 0;
        bottom: 0;
        width: 50%;
        height: 76%; /* reduced to avoid overflow */
        background-color: #F5F5F5;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 20px 0 0 0;
        box-shadow: -10px 0 20px rgba(0,0,0,0.05);
      }
      .truck-text {
        color: #B0BEC5;
        font-style: italic;
      }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="diagonal-accent-top"></div>
        <div class="content">
            <div class="logo-placeholder">U</div>
            <h1>Programa de Locação com Opção de Compra.</h1>
            <div class="subtitle">Uny FleetCom | Volvo FH 440 I-Shift 6x2.</div>
        </div>
        <div class="truck-placeholder">
            <span class="truck-text">[Espaço para Imagem do Caminhão Volvo]</span>
        </div>
        <div class="diagonal-accent-bottom"></div>
    </div>
</body>
</html>
