<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Open+Sans:wght@400&display=swap" rel="stylesheet">
    <style>
      body { margin: 0; }
      .slide-container {
        width: 1280px;
        min-height: 720px;
        background-color: #FFFFFF;
        font-family: 'Open Sans', sans-serif;
        position: relative;
        display: flex;
        overflow: hidden;
      }
      .diagonal-accent-top {
        position: absolute;
        top: -100px;
        right: -100px;
        width: 400px;
        height: 200px;
        background: linear-gradient(135deg, #1A237E 50%, #BF9B30 50%);
        transform: rotate(-15deg);
      }
      .content-wrapper {
        display: flex;
        width: 100%;
        align-items: flex-start; /* reduce vertical centering to save space */
      }
      .text-side {
        width: 60%;
        padding-top: 60px; /* do not change - title top padding must stay */
        padding-left: 80px;
      }
      .logo-mini {
        width: 50px;
        height: 50px;
        background-color: #1A237E;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: bold;
        margin-bottom: 12px; /* shrunk to save height */
      }
      h2 {
        font-family: 'Montserrat', sans-serif;
        color: #1A237E;
        font-size: 48px;
        margin-bottom: 24px; /* reduced spacing */
        line-height: 1.2;
      }
      .numbered-list {
        list-style: none;
        padding: 0;
      }
      .numbered-item {
        display: flex;
        align-items: flex-start;
        margin-bottom: 18px; /* reduced */
      }
      .number {
        font-family: 'Montserrat', sans-serif;
        font-size: 32px;
        color: #BF9B30;
        margin-right: 20px;
        font-weight: 700;
        min-width: 30px;
      }
      .item-text {
        font-size: 24px;
        color: #37474F;
        line-height: 1.4;
      }
      .item-text b {
        color: #1A237E;
        text-decoration: underline;
        text-decoration-color: #BF9B30;
      }
      .image-side {
        width: 40%;
        height: 100%;
        display: flex;
        align-items: flex-start; /* align to top to save vertical space */
        justify-content: center;
        padding-top: 60px; /* match text-side top padding */
        background-color: #F9F9F9;
      }
      .truck-placeholder {
        width: 380px;
        height: 420px; /* reduced height to avoid overflow */
        background-color: #E0E0E0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #757575;
        font-style: italic;
        text-align: center;
      }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="diagonal-accent-top"></div>
        <div class="content-wrapper">
            <div class="text-side">
                <div class="logo-mini">U</div>
                <h2>Modelo pensado para locar e adquirir.</h2>
                <div class="numbered-list">
                    <div class="numbered-item">
                        <div class="number">1)</div>
                        <div class="item-text">Estrutura de locação mensal com <b>opção de compra ao final</b>.</div>
                    </div>
                    <div class="numbered-item">
                        <div class="number">2)</div>
                        <div class="item-text">Ativo revisado e preparado para operação.</div>
                    </div>
                    <div class="numbered-item">
                        <div class="number">3)</div>
                        <div class="item-text">Previsibilidade patrimonial e operacional para parceiros elegíveis.</div>
                    </div>
                </div>
            </div>
            <div class="image-side">
                <div class="truck-placeholder">
                    [Imagem do Caminhão Volvo]
                </div>
            </div>
        </div>
    </div>
</body>
</html>
